services:
  ros-mcp:
    container_name: ${HARBOR_CONTAINER_PREFIX}.ros-mcp
    build:
      context: ./services/ros-mcp
      args:
        GIT_REF: ${HARBOR_ROS_MCP_GIT_REF}
    env_file:
      - ./.env
      - ./services/ros-mcp/override.env
    environment:
      - ROSBRIDGE_HOST=${HARBOR_ROS_MCP_ROSBRIDGE_HOST:-host.docker.internal}
      - ROSBRIDGE_PORT=${HARBOR_ROS_MCP_ROSBRIDGE_PORT:-9090}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - harbor-network
