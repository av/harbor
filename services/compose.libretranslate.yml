services:
  libretranslate:
    container_name: ${HARBOR_CONTAINER_PREFIX}.libretranslate
    image: ${HARBOR_LIBRETRANSLATE_IMAGE}:${HARBOR_LIBRETRANSLATE_VERSION}
    ports:
      - ${HARBOR_LIBRETRANSLATE_HOST_PORT}:5000
    env_file:
      - ./.env
      - ./services/libretranslate/override.env
    volumes:
      - ${HARBOR_LIBRETRANSLATE_WORKSPACE}/keys:/app/db
      - ${HARBOR_LIBRETRANSLATE_WORKSPACE}/local:/home/libretranslate/.local
    # The upstream image runs as uid 1032 (libretranslate:nogroup), which
    # cannot write the workspace mounts after the init sidecar chowns them
    # to the host user. Run as the host user instead — both writable paths
    # (/app/db and /home/libretranslate/.local) are the chowned mounts, so
    # an arbitrary uid works as long as HOME resolves to the mounted home.
    user: "${HARBOR_USER_ID}:${HARBOR_GROUP_ID}"
    # XDG dirs are pinned inside the mounted .local because the home dir
    # itself is image-owned (uid 1032) and not writable by the host user;
    # argostranslate honors XDG_* when creating its data/cache/config dirs.
    environment:
      - HOME=/home/libretranslate
      - XDG_DATA_HOME=/home/libretranslate/.local/share
      - XDG_CACHE_HOME=/home/libretranslate/.local/cache
      - XDG_CONFIG_HOME=/home/libretranslate/.local/config
    tty: true
    stdin_open: true
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      libretranslate-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  libretranslate-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.libretranslate-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/libretranslate/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/libretranslate/workspace-init.sh:/init.sh:ro
      - ${HARBOR_LIBRETRANSLATE_WORKSPACE}:/workspace
    networks:
      - harbor-network
