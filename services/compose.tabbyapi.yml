services:
  tabbyapi:
    image: ghcr.io/theroyallab/tabbyapi:latest
    container_name: ${HARBOR_CONTAINER_PREFIX}.tabbyapi
    env_file:
      - ./.env
      - ./services/tabbyapi/override.env
    ports:
      - ${HARBOR_TABBYAPI_HOST_PORT}:5000
    environment:
      - NAME=TabbyAPI
    volumes:
      - ${HARBOR_HF_CACHE:-./services/tabbyapi/.hf-cache}:/app/models/hf
      - ${HARBOR_LLAMACPP_CACHE}:/app/models/llama.cpp

      - ./shared/yaml_config_merger.py:/app/yaml_config_merger.py
      - ./services/tabbyapi/start_tabbyapi.sh:/app/start_tabbyapi.sh
      - ./services/tabbyapi/config.yml:/app/configs/config.yml
      - ./services/tabbyapi/api_tokens.yml:/app/tokens/tokens.yml
    entrypoint: [ "/app/start_tabbyapi.sh" ]
    command: >
      ${HARBOR_TABBYAPI_EXTRA_ARGS}
    networks:
      - harbor-network

