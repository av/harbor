services:
  ldr:
    image: ${HARBOR_LDR_IMAGE}:${HARBOR_LDR_VERSION}
    # build:
    #   context: https://github.com/LearningCircuit/local-deep-research.git
    #   dockerfile: Dockerfile
    container_name: ${HARBOR_CONTAINER_PREFIX}.ldr
    ports:
      - ${HARBOR_LDR_HOST_PORT}:5000
    env_file:
      - ./.env
      - ./services/ldr/override.env
    environment:
      - OPENAI_API_KEY=${HARBOR_OPENAI_KEY}
      - LDR_OPENAI_API_KEY=${HARBOR_OPENAI_KEY}
      - ANTHROPIC_API_KEY=${HARBOR_ANTHROPIC_KEY}
      - LDR_ANTHROPIC_API_KEY=${HARBOR_ANTHROPIC_KEY}
    volumes:
      - ${HARBOR_LDR_WORKSPACE}/config:/root/.config/local_deep_research
      # The image sets LDR_DATA_DIR=/data — all persistent state (encrypted
      # per-user DBs, research history) lives there. The old
      # site-packages/data path is stale for current images.
      - ${HARBOR_LDR_WORKSPACE}/data:/data
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      ldr-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Pre-creates config/ and data/ subdirs so
  # Docker doesn't auto-create the leafs as root:root.
  ldr-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.ldr-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/ldr/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/ldr/workspace-init.sh:/init.sh:ro
      - ${HARBOR_LDR_WORKSPACE}:/workspace
    networks:
      - harbor-network
