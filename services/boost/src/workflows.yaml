workflows:
  research-quick:
    name: Quick Research
    description: Register portable tools, run fast caveman web research, then answer.
    modules:
      - module: tools
        config:
          final: false
      - caveman
      - final

  research-deep:
    name: Deep Research
    description: Register portable tools, run two-hop ponytail research, then answer.
    modules:
      - module: tools
        config:
          final: false
      - ponytail
      - final

  code-check:
    name: Code Check
    description: Register portable tools, audit coding deliverables with autocheck, then answer.
    modules:
      - module: tools
        config:
          final: false
      - autocheck
      - final

  scope-guard:
    name: Scope Guard
    description: >-
      Lightweight bugfix workflow: register portable tools, enforce user-stated
      file scope with diffscope, audit deliverables with autocheck, then answer.
    modules:
      - module: tools
        config:
          final: false
      - diffscope
      - autocheck
      - final

  agent-research:
    name: Agent Research
    description: Tool-enabled smash-and-grab research for agentic coding sessions.
    modules:
      - module: tools
        config:
          final: false
      - caveman
      - final

  agent-code:
    name: Agent Code
    description: >-
      Sandbox coding session: register portable and workspace tools, enforce
      read-before-edit, scope constraints, and deliverable audit.
    modules:
      - module: tools
        config:
          final: false
      - module: sightline
        config:
          final: false
      - diffscope
      - autocheck
      - final

  shipyard:
    name: Shipyard
    description: >-
      Full agentic coding pipeline: keel grounding, selective caveman ideation,
      portable tools, ponytail implementation research, and autocheck audit.
    modules:
      - module: keel
        continue: true
        config:
          defer_final: true
      - module: caveman
        continue: true
        config:
          defer_final: true
      - module: tools
        config:
          final: false
      - module: ponytail
        continue: true
        config:
          defer_final: true
      - module: autocheck
        continue: true
        config:
          defer_final: true
      - final