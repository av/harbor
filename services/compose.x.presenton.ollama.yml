services:
  presenton:
    depends_on:
      - ollama
    environment:
      - LLM=ollama
      # Harbor's ollama on the compose network — not a host port; the
      # previous http://localhost:33821 pointed nowhere inside the container.
      - OLLAMA_URL=${HARBOR_OLLAMA_INTERNAL_URL}
      - OLLAMA_MODEL=${HARBOR_PRESENTON_OLLAMA_MODEL:-llama3.1:8b}
