services:
  ldr:
    environment:
      # LDR maps settings keys to env vars as LDR_ + key.upper().replace(".", "_")
      # (settings/manager.py check_env_setting). The searxng engine reads
      # search.engine.web.searxng.default_params.instance_url — without it the
      # engine is created but disabled ("missing instance URL").
      - LDR_SEARCH_TOOL=searxng
      - LDR_SEARCH_ENGINE_WEB_SEARXNG_DEFAULT_PARAMS_INSTANCE_URL=${HARBOR_SEARXNG_INTERNAL_URL}
