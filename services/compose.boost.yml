services:
  boost:
    container_name: ${HARBOR_CONTAINER_PREFIX}.boost
    build:
      context: ./services/boost
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./services/boost/override.env
    environment:
      - HARBOR_BOOST_WORKFLOWS=${HARBOR_BOOST_WORKFLOWS}
      - HARBOR_BOOST_WORKFLOWS_FILE=${HARBOR_BOOST_WORKFLOWS_FILE}
      - HARBOR_BOOST_TAVILY_API_KEY=${HARBOR_BOOST_TAVILY_API_KEY}
      - HARBOR_BOOST_SEARXNG_URL=${HARBOR_BOOST_SEARXNG_URL}
      - HARBOR_BOOST_SEARXNG_QUERY_PARAMS=${HARBOR_BOOST_SEARXNG_QUERY_PARAMS}
      - HARBOR_BOOST_JINA_READER_API_URL=${HARBOR_BOOST_JINA_READER_API_URL}
      - HARBOR_BOOST_JINA_READER_API_KEY=${HARBOR_BOOST_JINA_READER_API_KEY}
    volumes:
      - ./services/boost/src:/boost
      - /boost/.venv
      - ${HARBOR_OLLAMA_CACHE}:/root/.ollama
      - ${HARBOR_HF_CACHE:-./services/boost/.hf-cache}:/root/.cache/huggingface
      - ${HARBOR_LLAMACPP_CACHE}:/root/.cache/llama.cpp
      - ${HARBOR_VLLM_CACHE}:/root/.cache/vllm
    ports:
      - ${HARBOR_BOOST_HOST_PORT}:8000
    networks:
      - harbor-network
