services:
  mcp-inspector:
    container_name: ${HARBOR_CONTAINER_PREFIX}.mcp-inspector
    image: ghcr.io/av/tools:latest
    command: npx @modelcontextprotocol/inspector
    ports:
      - ${HARBOR_MCP_INSPECTOR_HOST_PORT}:6274
      - ${HARBOR_MCP_INSPECTOR_CLIENT_HOST_PORT}:6277
    environment:
      # Inspector binds localhost by default; HOST=0.0.0.0 makes both the UI
      # and the proxy reachable through the published ports. The previous
      # socat-forwarding entrypoint self-connected in a loop (inspector binds
      # ::1, socat forwarded to 127.0.0.1 — its own listener).
      - HOST=0.0.0.0
      # The proxy validates Origin against the UI's own origin; allow the
      # remapped Harbor host port.
      - ALLOWED_ORIGINS=http://localhost:${HARBOR_MCP_INSPECTOR_HOST_PORT}
    volumes:
      - ./services/mcp/cache:/app/cache
    env_file:
      - ./.env
      - ./services/mcp/override.env
    networks:
      - harbor-network
