services:
  mlx:
    container_name: ${HARBOR_CONTAINER_PREFIX}.mlx
    image: ${HARBOR_MLX_IMAGE}:${HARBOR_MLX_VERSION}
    env_file:
      - ./.env
      - ./services/mlx/override.env
    ports:
      - ${HARBOR_MLX_HOST_PORT}:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/mlx/Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - harbor-network
