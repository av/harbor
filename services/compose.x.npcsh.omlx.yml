services:
  npcsh:
    depends_on:
      omlx:
        condition: service_healthy
    environment:
      - NPCSH_CHAT_MODEL=${HARBOR_OMLX_MODEL}
      - NPCSH_CHAT_PROVIDER=openai-like
      - NPCSH_VISION_MODEL=${HARBOR_OMLX_MODEL}
      - NPCSH_VISION_PROVIDER=openai-like
      - NPCSH_REASONING_MODEL=${HARBOR_OMLX_MODEL}
      - NPCSH_REASONING_PROVIDER=openai-like
      - NPCSH_API_URL=http://omlx:8080/v1
      - OPENAI_BASE_URL=http://omlx:8080/v1
      - OPENAI_API_BASE=http://omlx:8080/v1
      - OPENAI_API_KEY=sk-omlx
