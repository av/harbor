services:
  bifrost-dmr-bootstrap:
    container_name: ${HARBOR_CONTAINER_PREFIX}.bifrost-dmr-bootstrap
    image: ${HARBOR_BIFROST_BOOTSTRAP_IMAGE}:${HARBOR_BIFROST_BOOTSTRAP_VERSION}
    env_file:
      - ./.env
      - ./services/bifrost/override.env
    environment:
      BIFROST_URL: http://bifrost:${HARBOR_BIFROST_APP_PORT}
      BIFROST_PROVIDER: dmr
      BIFROST_PROVIDER_KIND: custom-openai
      BIFROST_PROVIDER_BASE_URL: ${HARBOR_BIFROST_DMR_BASE_URL}
      BIFROST_PROVIDER_KEY: ${HARBOR_BIFROST_DMR_API_KEY}
      BIFROST_KEY_ID: harbor-dmr
      BIFROST_KEY_NAME: Harbor Docker Model Runner
      BIFROST_MODELS: ${HARBOR_BIFROST_DMR_MODELS}
    entrypoint: ["/bin/sh", "/usr/local/bin/bootstrap-provider.sh"]
    volumes:
      - ./services/bifrost/bootstrap-provider.sh:/usr/local/bin/bootstrap-provider.sh:ro
    depends_on:
      bifrost:
        condition: service_healthy
      dmr:
        condition: service_healthy
    networks:
      - harbor-network
