services:
  bifrost-mlx-bootstrap:
    container_name: ${HARBOR_CONTAINER_PREFIX}.bifrost-mlx-bootstrap
    image: ${HARBOR_BIFROST_BOOTSTRAP_IMAGE}:${HARBOR_BIFROST_BOOTSTRAP_VERSION}
    env_file:
      - ./.env
      - ./services/bifrost/override.env
    environment:
      BIFROST_URL: http://bifrost:${HARBOR_BIFROST_APP_PORT}
      BIFROST_PROVIDER: mlx
      BIFROST_PROVIDER_KIND: custom-openai
      BIFROST_PROVIDER_BASE_URL: ${HARBOR_BIFROST_MLX_BASE_URL}
      BIFROST_PROVIDER_KEY: ${HARBOR_BIFROST_MLX_API_KEY}
      BIFROST_KEY_ID: harbor-mlx
      BIFROST_KEY_NAME: Harbor MLX
      BIFROST_MODELS: ${HARBOR_BIFROST_MLX_MODELS}
    entrypoint: ["/bin/sh", "/usr/local/bin/bootstrap-provider.sh"]
    volumes:
      - ./services/bifrost/bootstrap-provider.sh:/usr/local/bin/bootstrap-provider.sh:ro
    depends_on:
      bifrost:
        condition: service_healthy
      mlx:
        condition: service_healthy
    networks:
      - harbor-network
