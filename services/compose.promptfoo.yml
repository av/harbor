services:
  promptfoo:
    container_name: ${HARBOR_CONTAINER_PREFIX}.promptfoo
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      promptfoo-init:
        condition: service_completed_successfully
    env_file:
      - ./.env
      - ./services/promptfoo/override.env
    user: "${HARBOR_USER_ID}:${HARBOR_GROUP_ID}"
    environment:
      - PROMPTFOO_REMOTE_API_BASE_URL=${HARBOR_PROMPTFOO_REMOTE_API_BASE_URL}
      - PROMPTFOO_REMOTE_APP_BASE_URL=http://localhost:${HARBOR_PROMPTFOO_REMOTE_APP_BASE_URL}
      - PROMPTFOO_DISABLE_TELEMETRY=1
      - PROMPTFOO_DISABLE_UPDATE=1
      - FIREWORKS_API_KEY=${HARBOR_FIREWORKS_API_KEY}
      - COHERE_API_KEY=${HARBOR_COHERE_KEY}
      - GROQ_API_KEY=${HARBOR_GROQ_KEY}
      - MISTRAL_API_KEY=${HARBOR_MISTRAL_KEY}
      - OPENROUTER_API_KEY=${HARBOR_OPENROUTER_KEY}
      - PERPLEXITY_API_KEY=${HARBOR_PERPLEXITY_KEY}
      - TOGETHER_API_KEY=${HARBOR_TOGETHERAI_KEY}
      - ANTHROPIC_API_KEY=${HARBOR_ANTHROPIC_KEY}
      - GOOGLE_API_KEY=${HARBOR_GOOGLE_KEY}
    image: ${HARBOR_PROMPTFOO_IMAGE}:${HARBOR_PROMPTFOO_VERSION}
    ports:
      - ${HARBOR_PROMPTFOO_HOST_PORT}:3000
    volumes:
      - ${HARBOR_PROMPTFOO_WORKSPACE}:/home/promptfoo/.promptfoo
    # Original healthcheck is very
    # slow, server starts in ~2s, so overriding
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      interval: 2s
      timeout: 1s
      start_period: 1s
      retries: 5
    # Avoiding issues with SIGTERM in the original
    command: ["ash", "-c", "node /app/dist/src/server/index.js"]
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio,
  # beszel, and oterm.
  promptfoo-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.promptfoo-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/promptfoo/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/promptfoo/workspace-init.sh:/init.sh:ro
      - ${HARBOR_PROMPTFOO_WORKSPACE}:/workspace
    networks:
      - harbor-network
