services:
  ollama:
    image: ${HARBOR_OLLAMA_IMAGE}:${HARBOR_OLLAMA_VERSION}
    container_name: ${HARBOR_CONTAINER_PREFIX}.ollama
    env_file:
      - ./.env
      - ./services/ollama/override.env
    volumes:
      - ${HARBOR_OLLAMA_CACHE}:/root/.ollama
      - ${HARBOR_HF_CACHE:-./services/ollama/.hf-cache}:/root/.cache/huggingface
      - ${HARBOR_LLAMACPP_CACHE}:/root/.cache/llama.cpp
      - ${HARBOR_VLLM_CACHE}:/root/.cache/vllm
      - ./services/ollama/modelfiles:/modelfiles
    tty: true
    ports:
      - ${HARBOR_OLLAMA_HOST_PORT}:11434
    healthcheck:
      test: ["CMD-SHELL", "bash -c '{ printf \"GET / HTTP/1.0\\r\\n\\r\\n\" >&3; cat <&3; } 3<>/dev/tcp/localhost/11434 | grep -q \"Ollama is\" || exit 1'"]
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - harbor-network

  # Runs an "init" script once during the first start
  # of ollama service
  ollama-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    image: ${HARBOR_OLLAMA_IMAGE}:${HARBOR_OLLAMA_VERSION}
    env_file:
      - ./.env
      - ./services/ollama/override.env
    volumes:
      - ${HARBOR_OLLAMA_CACHE}:/root/.ollama
      - ./services/ollama/init_entrypoint.sh:/init_entrypoint.sh
    entrypoint: /init_entrypoint.sh
    # Healthcheck flips to OK as soon as default-model pulls finish; the
    # entrypoint then `tail -f`s to stay running. This makes compose --wait
    # classify the sidecar as running|healthy in every up combination,
    # rather than treating its (previously-clean) exit as premature.
    # 30-min retry budget covers cold pulls of multi-GB default models. Misconfigs
    # (bad model id, ollama down) exit the entrypoint via `set -e` and surface as
    # a non-zero container exit, not as a healthcheck timeout — see init_entrypoint.sh.
    healthcheck:
      test: ["CMD-SHELL", "test -f /run/harbor/ollama-init-done"]
      interval: 2s
      timeout: 3s
      retries: 900
      start_period: 5s
    tty: true
    networks:
      - harbor-network