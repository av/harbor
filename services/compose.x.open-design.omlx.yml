services:
  open-design:
    depends_on:
      omlx:
        condition: service_healthy
    environment:
      HARBOR_OPEN_DESIGN_DEFAULT_API_PROTOCOL: openai
      HARBOR_OPEN_DESIGN_DEFAULT_BASE_URL: http://omlx:8080/v1
      HARBOR_OPEN_DESIGN_DEFAULT_API_KEY: sk-omlx
      HARBOR_OPEN_DESIGN_DEFAULT_MODEL: ${HARBOR_OMLX_MODEL}
      HARBOR_OPEN_DESIGN_DEFAULT_PROVIDER_BASE_URL: http://omlx:8080/v1
