services:
  npcsh:
    depends_on:
      mlx:
        condition: service_healthy
    environment:
      - NPCSH_CHAT_MODEL=${HARBOR_MLX_MODEL}
      - NPCSH_CHAT_PROVIDER=openai-like
      - NPCSH_VISION_MODEL=${HARBOR_MLX_MODEL}
      - NPCSH_VISION_PROVIDER=openai-like
      - NPCSH_REASONING_MODEL=${HARBOR_MLX_MODEL}
      - NPCSH_REASONING_PROVIDER=openai-like
      - NPCSH_API_URL=http://mlx:8080/v1
      - OPENAI_BASE_URL=http://mlx:8080/v1
      - OPENAI_API_BASE=http://mlx:8080/v1
      - OPENAI_API_KEY=sk-mlx
