
services:
  optillm:
    container_name: ${HARBOR_CONTAINER_PREFIX}.optillm
    build:
      context: https://github.com/codelion/optillm.git#main
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./services/optillm/override.env
    # Upstream defaults to binding 127.0.0.1 "for security" — unreachable
    # through the published port without this.
    environment:
      - OPTILLM_HOST=0.0.0.0
    volumes:
      - ${HARBOR_OPTILLM_WORKSPACE}:/root/.config/optillm
    ports:
      - ${HARBOR_OPTILLM_HOST_PORT}:8000
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      optillm-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  optillm-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.optillm-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/optillm/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/optillm/workspace-init.sh:/init.sh:ro
      - ${HARBOR_OPTILLM_WORKSPACE}:/workspace
    networks:
      - harbor-network
