services:
  mi:
    # Mounts harbor.sh by design so mi can drive the Harbor CLI
    x-harbor-lint-ignore: [volume-paths]
    environment:
      - MI_API_PARAMS={"temperature":0.25}
    volumes:
      - ./docs:/harbor/docs:ro
      - ./harbor.sh:/harbor/harbor.sh:ro
      - ./services/mi/harbor-how.sh:/harbor/harbor-how.sh:ro
