name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/integration.yml'
      - 'integration/**'
      - '.scripts/integration.ts'
      - 'harbor.sh'
      - 'requirements.sh'
      - 'services/compose.mock-openai.yml'
      - 'services/mock-openai/override.env'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/integration.yml'
      - 'integration/**'
      - '.scripts/integration.ts'
      - 'harbor.sh'
      - 'requirements.sh'
      - 'services/compose.mock-openai.yml'
      - 'services/mock-openai/override.env'
  workflow_dispatch:
  workflow_call:

jobs:
  integration:
    name: Integration Smoke Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts
          cache: true

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Run integration suite
        run: bash harbor.sh dev integration --no-provision --artifacts-dir "${{ github.workspace }}/integration/artifacts/${{ github.run_id }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts-${{ github.run_id }}
          path: integration/artifacts/
          retention-days: 7
