# expect-rule: network
services:
  alpha:
    image: alpine:latest
    container_name: ${HARBOR_CONTAINER_PREFIX}.alpha
    ports:
      - ${HARBOR_ALPHA_HOST_PORT}:8080
    networks:
      - harbor-network
  beta:
    image: alpine:latest
    container_name: ${HARBOR_CONTAINER_PREFIX}.beta
    depends_on:
      - alpha
    networks:
      - harbor-network
